<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuonConto - POSレジ</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Tailwind CSSの設定を上書きし、デフォルトのsansフォントをLINE Seed JPに変更 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"LINE Seed JP"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* LINE Seed JP フォントの読み込み */
    @import url('https://cdn.jsdelivr.net/npm/@line/seed@1.0.0/app/css/seed.css');
    
    /* システム名やロゴなど、特定の場所は標準のサンセリフ体を維持 */
    .system-name {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-weight: 800;
    }
  </style>
</head>
<body class="min-h-screen bg-[#F4F7F5] flex flex-col font-sans print:bg-white text-[#111111]">

  <!-- 印刷用ビュー（通常時は非表示） -->
  <div id="print-view-container" class="hidden print:block absolute top-0 left-0 w-full bg-white text-black p-8 font-mono text-sm z-50"></div>

  <!-- ヘッダー＆ナビゲーション（印刷時は非表示） -->
  <header id="header-container" class="bg-[#0F543C] text-white p-4 shadow-md print:hidden flex justify-between items-center" role="banner"></header>

  <!-- メインコンテンツ（印刷時は非表示） -->
  <main id="main-content" class="flex-1 overflow-hidden print:hidden flex flex-col"></main>

  <!-- 追加: フッター（印刷時は非表示） -->
  <footer class="bg-[#0A3D2B] text-white py-4 px-6 text-xs print:hidden border-t-4 border-[#0F543C] flex justify-between items-center" role="contentinfo">
    <div class="text-[#AAAAAA]">&copy; 2026 Midnight Express Computational Archives</div>
    <div class="flex flex-col items-end opacity-60 hover:opacity-100 transition-opacity">
      <img src="mecalogo-white.png" alt="MECAロゴ" class="h-6 mb-1 object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
      <!-- 画像が見つからない場合のフォールバックテキスト -->
      <div class="text-lg tracking-wider system-name leading-none mb-1 hidden">mecalogo-white</div>
      <div class="text-[10px]">しんやせっけいしゃ（MECA）</div>
    </div>
  </footer>

  <!-- モーダル・プレビュー用コンテナ -->
  <div id="modal-container"></div>

  <script>
    // --- 初期データ ---
    const INITIAL_MENU = [
      { id: 1, name: 'マルゲリータ', price: 1200, category: 'ピザ' },
      { id: 2, name: 'クワトロフォルマッジ', price: 1500, category: 'ピザ' },
      { id: 3, name: 'カルボナーラ', price: 1100, category: 'パスタ' },
      { id: 4, name: 'ペスカトーレ', price: 1400, category: 'パスタ' },
      { id: 5, name: 'カプリチョーザ', price: 1300, category: 'ピザ' },
      { id: 6, name: '生ハムとチーズの盛り合わせ', price: 900, category: '前菜' },
      { id: 7, name: '自家製ティラミス', price: 600, category: 'デザート' },
      { id: 8, name: 'グラスワイン（赤）', price: 500, category: 'ドリンク' },
      { id: 9, name: '生ビール', price: 600, category: 'ドリンク' },
      { id: 10, name: 'エスプレッソ', price: 400, category: 'ドリンク' },
    ];

    const CATEGORIES = ['すべて', 'ピザ', 'パスタ', '前菜', 'デザート', 'ドリンク'];
    const TABLES = [1, 2, 3, 4, 5, 6];

    // --- ステート管理 ---
    const state = {
      activeTab: 'pos', // pos, kitchen, sales, menu, settings
      menu: INITIAL_MENU,
      selectedCategory: 'すべて',
      selectedTable: 1,
      tableOrders: TABLES.reduce((acc, table) => ({ ...acc, [table]: [] }), {}),
      kitchenTickets: [],
      salesRecord: [],
      printContent: null, // { type: 'kitchen' | 'receipt', data: ... }
      isAuditPanelOpen: false,
      customers: [], 
      editingMenu: null, 
      isCustomerModalOpen: false, 
      deletingMenuId: null,
      customizingItem: null, // 追加: オプション・備考入力中のメニューアイテム
      storeInfo: {           // 追加: 店舗情報（レシート印字用）
        name: 'BuonConto',
        address: '東京都板橋区○○ 1-2-3',
        tel: '03-1234-5678',
        message: 'ご来店ありがとうございました。\nまたのお越しをお待ちしております。'
      },
      storeInfoSaved: false  // 保存完了表示用フラグ
    };


    // --- ローカルストレージ自動保存・復元 ---
    function saveToLocalStorage() {
      const dataToSave = {
        menu: state.menu,
        customers: state.customers,
        salesRecord: state.salesRecord,
        storeInfo: state.storeInfo,
        tableOrders: state.tableOrders,
        kitchenTickets: state.kitchenTickets
      };
      localStorage.setItem('buonconto_data', JSON.stringify(dataToSave));
    }

    function loadFromLocalStorage() {
      const dataStr = localStorage.getItem('buonconto_data');
      if (dataStr) {
        try {
          const importedData = JSON.parse(dataStr);
          if (importedData.menu) state.menu = importedData.menu;
          if (importedData.customers) state.customers = importedData.customers;
          if (importedData.storeInfo) state.storeInfo = importedData.storeInfo;
          if (importedData.tableOrders) state.tableOrders = importedData.tableOrders;
          // 日付文字列をDateオブジェクトに復元する
          if (importedData.salesRecord) {
            state.salesRecord = importedData.salesRecord.map(r => ({ ...r, time: new Date(r.time) }));
          }
          if (importedData.kitchenTickets) {
            state.kitchenTickets = importedData.kitchenTickets.map(t => ({ ...t, time: new Date(t.time) }));
          }
        } catch (e) {
          console.error("データの読み込みに失敗しました", e);
        }
      }
    }

    // --- 計算・ヘルパー関数 ---
    function formatTime(date) {
      return date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDateTime(date) {
      return date.toLocaleString('ja-JP');
    }

    // --- 操作アクション（グローバル関数化） ---
    window.setActiveTab = (tab) => { state.activeTab = tab; render(); };
    window.setSelectedCategory = (cat) => { state.selectedCategory = cat; render(); };
    window.setSelectedTable = (table) => { state.selectedTable = table; render(); };
    
    window.setIsAuditPanelOpen = (isOpen) => { state.isAuditPanelOpen = isOpen; render(); };
    window.setIsCustomerModalOpen = (isOpen) => { state.isCustomerModalOpen = isOpen; render(); };
    window.closePrintModal = () => { state.printContent = null; render(); };

    // --- メニューカスタマイズ（備考・追加料金） ---
    window.openCustomizeModal = (itemId) => {
      const menuItem = state.menu.find(m => m.id === itemId);
      state.customizingItem = { item: menuItem, note: '', extraCharge: 0 };
      render();
    };

    window.closeCustomizeModal = () => {
      state.customizingItem = null;
      render();
    };

    window.setExtraCharge = (amount) => {
      const input = document.getElementById('cust-extra');
      if (input) {
        input.value = amount;
      }
    };

    window.confirmCustomizedOrder = () => {
      if (!state.customizingItem) return;
      
      const noteInput = document.getElementById('cust-note');
      const extraInput = document.getElementById('cust-extra');
      
      const note = noteInput ? noteInput.value.trim() : '';
      const extraCharge = extraInput ? (parseInt(extraInput.value, 10) || 0) : 0;
      const { item } = state.customizingItem;
      const tableOrder = state.tableOrders[state.selectedTable];

      // 全く同じ商品・備考・追加料金の未送信アイテムがあれば、数量を増やす
      const existingItemIndex = tableOrder.findIndex(o => 
        o.item.id === item.id && 
        o.note === note && 
        o.extraCharge === extraCharge && 
        !o.sentToKitchen
      );

      if (existingItemIndex >= 0) {
        tableOrder[existingItemIndex].qty += 1;
      } else {
        tableOrder.push({ 
          id: Date.now() + Math.random(), // ユニークID
          item, 
          qty: 1, 
          note, 
          extraCharge, 
          sentToKitchen: false 
        });
      }

      state.customizingItem = null;
      render();
    };

    // --- 店舗情報用アクション ---
    window.saveStoreInfo = () => {
      const nameEl = document.getElementById('store-name');
      const telEl = document.getElementById('store-tel');
      const addressEl = document.getElementById('store-address');
      const messageEl = document.getElementById('store-message');

      if (nameEl && telEl && addressEl && messageEl) {
        state.storeInfo.name = nameEl.value.trim();
        state.storeInfo.tel = telEl.value.trim();
        state.storeInfo.address = addressEl.value.trim();
        state.storeInfo.message = messageEl.value.trim();
        
        state.storeInfoSaved = true;
        render();
        
        // 3秒後に「保存しました」の表示を元に戻す
        setTimeout(() => {
          state.storeInfoSaved = false;
          render();
        }, 3000);
      }
    };

    // --- データバックアップ（JSONファイル入出力） ---
    window.exportData = () => {
      const dataToSave = {
        menu: state.menu,
        customers: state.customers,
        salesRecord: state.salesRecord,
        storeInfo: state.storeInfo,
        tableOrders: state.tableOrders,
        kitchenTickets: state.kitchenTickets
      };
      const jsonStr = JSON.stringify(dataToSave, null, 2);
      const blob = new Blob([jsonStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      
      const d = new Date();
      const dateStr = `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}_${String(d.getHours()).padStart(2, '0')}${String(d.getMinutes()).padStart(2, '0')}`;
      a.download = `buonconto_backup_${dateStr}.json`; // 日時つきのファイル名で保存
      
      a.click();
      URL.revokeObjectURL(url);
    };

    window.triggerImport = () => {
      document.getElementById('import-file-input').click();
    };

    window.importData = (event) => {
      const file = event.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const importedData = JSON.parse(e.target.result);
          if (importedData.menu) state.menu = importedData.menu;
          if (importedData.customers) state.customers = importedData.customers;
          if (importedData.storeInfo) state.storeInfo = importedData.storeInfo;
          if (importedData.tableOrders) state.tableOrders = importedData.tableOrders;
          // 日付文字列をDateオブジェクトに復元する
          if (importedData.salesRecord) {
            state.salesRecord = importedData.salesRecord.map(r => ({ ...r, time: new Date(r.time) }));
          }
          if (importedData.kitchenTickets) {
            state.kitchenTickets = importedData.kitchenTickets.map(t => ({ ...t, time: new Date(t.time) }));
          }
          
          alert('データの復元が完了しました。');
          render();
        } catch (error) {
          alert('ファイルの読み込みに失敗しました。正しいJSONファイルを選択してください。');
          console.error(error);
        }
      };
      reader.readAsText(file);
      event.target.value = ''; // 連続で同じファイルを読み込めるようにリセット
    };

    // --- メニュー管理用アクション ---
    window.openMenuModal = (id) => {
      if (id) {
        state.editingMenu = { ...state.menu.find(m => m.id === id) };
      } else {
        state.editingMenu = { id: null, name: '', price: 1000, category: CATEGORIES[1] };
      }
      render();
    };

    window.saveMenu = () => {
      const name = document.getElementById('modal-menu-name').value.trim();
      const price = parseInt(document.getElementById('modal-menu-price').value, 10);
      const category = document.getElementById('modal-menu-category').value;
      
      if (!name || isNaN(price)) return; 

      if (state.editingMenu.id) {
        const idx = state.menu.findIndex(m => m.id === state.editingMenu.id);
        if (idx !== -1) {
          state.menu[idx] = { id: state.editingMenu.id, name, price, category };
        }
      } else {
        state.menu.push({ id: Date.now(), name, price, category });
      }
      state.editingMenu = null;
      render();
    };

    window.confirmDeleteMenu = (id) => {
      state.deletingMenuId = id;
      render();
    };
    
    window.executeDeleteMenu = () => {
      state.menu = state.menu.filter(m => m.id !== state.deletingMenuId);
      state.deletingMenuId = null;
      render();
    };
    
    window.cancelDeleteMenu = () => {
      state.deletingMenuId = null;
      render();
    };

    // --- 顧客管理用アクション ---
    window.saveCustomer = () => {
      const name = document.getElementById('modal-cust-name').value.trim();
      const note = document.getElementById('modal-cust-note').value.trim();
      
      if (!name) return;
      
      state.customers.push({ id: Date.now(), name, note });
      state.isCustomerModalOpen = false;
      render();
    };

    window.updateQty = (index, delta) => {
      const tableOrder = state.tableOrders[state.selectedTable];
      const newQty = tableOrder[index].qty + delta;
      
      if (newQty <= 0) {
        tableOrder.splice(index, 1);
      } else {
        tableOrder[index].qty = newQty;
      }
      render();
    };

    window.sendToKitchen = () => {
      const currentOrder = state.tableOrders[state.selectedTable];
      const unsentItems = currentOrder.filter(o => !o.sentToKitchen);
      if (unsentItems.length === 0) return;

      const newTicket = {
        id: Date.now(),
        table: state.selectedTable,
        time: new Date(),
        items: unsentItems.map(o => ({ ...o })),
        status: 'pending'
      };

      currentOrder.forEach(o => o.sentToKitchen = true);
      state.kitchenTickets.unshift(newTicket);
      
      state.printContent = { type: 'kitchen', data: newTicket };
      render();
    };

    window.processCheckout = () => {
      const currentOrder = state.tableOrders[state.selectedTable];
      if (currentOrder.length === 0) return;

      // 小計計算（追加料金を含む）
      const subtotal = currentOrder.reduce((sum, o) => sum + ((o.item.price + (o.extraCharge || 0)) * o.qty), 0);
      const tax = Math.floor(subtotal * 0.1);
      const total = subtotal + tax;

      const receiptData = {
        id: Date.now(),
        table: state.selectedTable,
        time: new Date(),
        items: [...currentOrder],
        subtotal,
        tax,
        total
      };

      state.salesRecord.unshift(receiptData);
      state.tableOrders[state.selectedTable] = [];

      state.printContent = { type: 'receipt', data: receiptData };
      render();
    };

    window.markTicketCompleted = (ticketId) => {
      const ticket = state.kitchenTickets.find(t => t.id === ticketId);
      if (ticket) ticket.status = 'completed';
      render();
    };

    window.handlePrint = () => {
      window.print();
      window.closePrintModal();
    };

    // --- レンダリング関数群 ---

    function getHeaderHTML() {
      const pendingCount = state.kitchenTickets.filter(t => t.status === 'pending').length;
      let badgeHTML = '';
      if (pendingCount > 0) {
        badgeHTML = `<span class="bg-[#D32F2F] text-white text-sm font-bold px-2 py-0.5 rounded-full ml-1" aria-label="未処理の伝票が${pendingCount}件あります">${pendingCount}</span>`;
      }
      
      const isPos = state.activeTab === 'pos';
      const isKitchen = state.activeTab === 'kitchen';
      const isSales = state.activeTab === 'sales';
      const isMenu = state.activeTab === 'menu';
      const isSettings = state.activeTab === 'settings';

      const posClass = isPos ? 'bg-[#FFC700] text-[#111111] font-bold shadow border-[#FFC700]' : 'text-white border-transparent hover:bg-[#146c4d]';
      const kitchenClass = isKitchen ? 'bg-[#FFC700] text-[#111111] font-bold shadow border-[#FFC700]' : 'text-white border-transparent hover:bg-[#146c4d]';
      const salesClass = isSales ? 'bg-[#FFC700] text-[#111111] font-bold shadow border-[#FFC700]' : 'text-white border-transparent hover:bg-[#146c4d]';
      const menuClass = isMenu ? 'bg-[#FFC700] text-[#111111] font-bold shadow border-[#FFC700]' : 'text-white border-transparent hover:bg-[#146c4d]';
      const settingsClass = isSettings ? 'bg-[#FFC700] text-[#111111] font-bold shadow border-[#FFC700]' : 'text-white border-transparent hover:bg-[#146c4d]';

      return `
        <div class="flex items-center space-x-3">
          <i data-lucide="utensils-crossed" class="w-8 h-8" aria-hidden="true"></i>
          <h1 class="text-2xl tracking-wider system-name">BuonConto</h1>
        </div>
        <div class="flex items-center space-x-4">
          <button
            id="btn-audit"
            onclick="window.setIsAuditPanelOpen(true)"
            aria-label="アクセシビリティ監査パネルを開く"
            class="flex items-center space-x-2 border-2 border-white/40 bg-[#0A3D2B] px-3 py-2 rounded-lg hover:bg-[#146c4d] transition-colors focus:outline-none focus:ring-4 focus:ring-[#FFC700] min-h-[44px]"
          >
            <i data-lucide="shield-check" class="w-6 h-6" aria-hidden="true"></i>
            <span class="font-bold text-base tracking-wide">WCAG 2.2 AAA</span>
          </button>

          <nav class="flex space-x-2 bg-[#0A3D2B] p-1.5 rounded-lg" aria-label="メインナビゲーション">
            <button onclick="window.setActiveTab('pos')" aria-current="${isPos ? 'page' : 'false'}" class="px-4 py-2 min-h-[44px] rounded-md flex items-center space-x-2 transition-colors focus:outline-none focus:ring-4 focus:ring-[#FFC700] border-2 ${posClass}">
              <i data-lucide="calculator" class="w-5 h-5" aria-hidden="true"></i><span class="text-lg">注文・レジ</span>
            </button>
            <button onclick="window.setActiveTab('kitchen')" aria-current="${isKitchen ? 'page' : 'false'}" class="px-4 py-2 min-h-[44px] rounded-md flex items-center space-x-2 transition-colors focus:outline-none focus:ring-4 focus:ring-[#FFC700] border-2 ${kitchenClass}">
              <i data-lucide="chef-hat" class="w-5 h-5" aria-hidden="true"></i><span class="text-lg">厨房伝票</span>${badgeHTML}
            </button>
            <button onclick="window.setActiveTab('sales')" aria-current="${isSales ? 'page' : 'false'}" class="px-4 py-2 min-h-[44px] rounded-md flex items-center space-x-2 transition-colors focus:outline-none focus:ring-4 focus:ring-[#FFC700] border-2 ${salesClass}">
              <i data-lucide="book-open" class="w-5 h-5" aria-hidden="true"></i><span class="text-lg">売上帳簿</span>
            </button>
            <button onclick="window.setActiveTab('menu')" aria-current="${isMenu ? 'page' : 'false'}" class="px-4 py-2 min-h-[44px] rounded-md flex items-center space-x-2 transition-colors focus:outline-none focus:ring-4 focus:ring-[#FFC700] border-2 ${menuClass}">
              <i data-lucide="clipboard-list" class="w-5 h-5" aria-hidden="true"></i><span class="text-lg">メニュー</span>
            </button>
            <button onclick="window.setActiveTab('settings')" aria-current="${isSettings ? 'page' : 'false'}" class="px-4 py-2 min-h-[44px] rounded-md flex items-center space-x-2 transition-colors focus:outline-none focus:ring-4 focus:ring-[#FFC700] border-2 ${settingsClass}">
              <i data-lucide="settings" class="w-5 h-5" aria-hidden="true"></i><span class="text-lg">設定</span>
            </button>
          </nav>
        </div>
      `;
    }

    function getMainHTML() {
      if (state.activeTab === 'pos') {
        const filteredMenu = state.selectedCategory === 'すべて' ? state.menu : state.menu.filter(i => i.category === state.selectedCategory);
        const currentOrder = state.tableOrders[state.selectedTable];
        
        // 小計の計算（オプション料金を加算）
        const subtotal = currentOrder.reduce((sum, o) => sum + ((o.item.price + (o.extraCharge || 0)) * o.qty), 0);
        const tax = Math.floor(subtotal * 0.1);
        const total = subtotal + tax;
        const hasUnsentItems = currentOrder.some(o => !o.sentToKitchen);

        let catsHTML = '';
        CATEGORIES.forEach(cat => {
          const isSelected = state.selectedCategory === cat;
          const bgClass = isSelected ? 'bg-[#0F543C] text-white border-[#0F543C]' : 'bg-white text-[#222222] border-[#777777] hover:bg-[#E8F0EC]';
          catsHTML += `<button onclick="window.setSelectedCategory('${cat}')" aria-pressed="${isSelected}" class="px-5 py-2 min-h-[44px] text-lg rounded-full whitespace-nowrap border-2 font-bold transition-colors focus:outline-none focus:ring-4 focus:ring-[#0F543C] focus:ring-offset-2 ${bgClass}">${cat}</button>`;
        });

        let menuHTML = '';
        filteredMenu.forEach(item => {
          // 直接カートに入れるのではなく、カスタマイズモーダルを開く
          menuHTML += `<button onclick="window.openCustomizeModal(${item.id})" aria-label="${item.name} のオプション・備考を入力して注文する。基本価格 ${item.price}円" class="bg-white border-2 border-[#CCCCCC] rounded-xl p-4 flex flex-col items-center justify-center text-center hover:shadow-lg hover:border-[#0F543C] transition-all active:scale-95 min-h-[120px] focus:outline-none focus:ring-4 focus:ring-[#0F543C] focus:ring-offset-2"><span class="text-sm font-bold text-[#444444] mb-1">${item.category}</span><span class="font-bold text-[#111111] text-lg mb-2">${item.name}</span><span class="text-[#0F543C] font-bold text-xl">¥${item.price.toLocaleString()}</span></button>`;
        });

        let tablesHTML = '';
        TABLES.forEach(t => {
          const hasUnsent = state.tableOrders[t].some(o => !o.sentToKitchen);
          const hasOrder = state.tableOrders[t].length > 0;
          const isSelected = state.selectedTable === t;
          let btnClass = isSelected ? 'border-[#0F543C] text-[#0F543C] bg-[#E8F0EC]' : 'border-transparent text-[#444444] hover:bg-[#DDDDDD]';
          if (hasOrder && !isSelected) btnClass = 'bg-[#FFECB3] text-[#805B00]';
          let badgeHTML = '';
          if (hasUnsent) {
            badgeHTML = `<span class="absolute top-0 right-0 w-3.5 h-3.5 bg-[#D32F2F] rounded-full border-2 border-white" aria-hidden="true"></span>`;
          }
          tablesHTML += `<button onclick="window.setSelectedTable(${t})" aria-pressed="${isSelected}" aria-label="テーブル ${t}${hasUnsent ? '。未送信の注文あり' : ''}" class="w-12 h-12 min-h-[44px] min-w-[44px] rounded-full flex items-center justify-center font-bold text-lg border-2 transition-colors relative focus:outline-none focus:ring-4 focus:ring-[#0F543C] focus:ring-offset-1 ${btnClass}">${t}${badgeHTML}</button>`;
        });

        let ordersHTML = '';
        if (currentOrder.length === 0) {
          ordersHTML = `<div class="h-full flex flex-col items-center justify-center text-[#555555] space-y-4"><i data-lucide="receipt-text" class="w-12 h-12 opacity-40" aria-hidden="true"></i><p class="font-bold text-lg">注文がありません</p></div>`;
        } else {
          let itemsListHTML = '';
          currentOrder.forEach((orderItem, index) => {
            const borderClass = orderItem.sentToKitchen ? 'border-[#CCCCCC] opacity-80' : 'border-[#0F543C] shadow-sm';
            
            let statusBadge = '';
            if (orderItem.sentToKitchen) {
              statusBadge = `<span class="ml-2 text-xs bg-[#EEEEEE] text-[#333333] px-2 py-1 rounded font-bold border border-[#AAAAAA] align-middle">注文済</span>`;
            }

            // 備考と追加料金の表示部分
            let noteHTML = '';
            if (orderItem.note) {
              noteHTML = `<div class="text-sm text-[#D32F2F] font-bold mt-1"><i data-lucide="message-square-text" class="w-4 h-4 inline-block -mt-1 mr-1"></i>${orderItem.note}</div>`;
            }
            let extraChargeHTML = '';
            if (orderItem.extraCharge) {
              extraChargeHTML = `<div class="text-sm text-[#0F543C] font-bold mt-0.5"><i data-lucide="plus-circle" class="w-4 h-4 inline-block -mt-1 mr-1"></i>オプション: +¥${orderItem.extraCharge.toLocaleString()}</div>`;
            }

            const unitPrice = orderItem.item.price + (orderItem.extraCharge || 0);
            const iconBtn = orderItem.qty === 1 ? `<i data-lucide="trash-2" class="w-6 h-6 text-[#D32F2F]" aria-hidden="true"></i>` : `<i data-lucide="minus" class="w-6 h-6" aria-hidden="true"></i>`;
            
            itemsListHTML += `
              <div class="bg-white p-3 rounded-lg border-2 ${borderClass}">
                <div class="flex justify-between items-start mb-2">
                  <div>
                    <span class="font-bold text-[#111111] text-lg">${orderItem.item.name}</span>${statusBadge}
                    ${noteHTML}
                    ${extraChargeHTML}
                  </div>
                  <span class="font-bold text-lg text-[#111111] pl-2">¥${(unitPrice * orderItem.qty).toLocaleString()}</span>
                </div>
                <div class="flex items-center justify-between">
                  <span class="text-sm font-bold text-[#444444]">@ ¥${unitPrice.toLocaleString()}</span>
                  <div class="flex items-center space-x-3 bg-[#F4F7F5] rounded-lg p-1 border border-[#CCCCCC]">
                    <button onclick="window.updateQty(${index}, -1)" aria-label="${orderItem.item.name} を1つ減らす" class="w-11 h-11 min-h-[44px] min-w-[44px] flex items-center justify-center bg-white rounded-md shadow-sm border border-[#CCCCCC] text-[#222222] hover:bg-[#EEEEEE] focus:outline-none focus:ring-4 focus:ring-[#0F543C]">${iconBtn}</button>
                    <span class="font-bold text-xl w-6 text-center">${orderItem.qty}</span>
                    <button onclick="window.updateQty(${index}, 1)" aria-label="${orderItem.item.name} を1つ増やす" class="w-11 h-11 min-h-[44px] min-w-[44px] flex items-center justify-center bg-white rounded-md shadow-sm border border-[#CCCCCC] text-[#222222] hover:bg-[#EEEEEE] focus:outline-none focus:ring-4 focus:ring-[#0F543C]"><i data-lucide="plus" class="w-6 h-6" aria-hidden="true"></i></button>
                  </div>
                </div>
              </div>
            `;
          });
          ordersHTML = `<div class="space-y-3">${itemsListHTML}</div>`;
        }

        const btnSendDisabled = hasUnsentItems ? '' : 'disabled';
        const btnCheckoutDisabled = currentOrder.length > 0 ? '' : 'disabled';

        return `
          <div class="flex h-full">
            <div class="flex-1 flex flex-col border-r-2 border-[#CCCCCC] bg-white h-full overflow-hidden">
              <div class="p-4 border-b-2 border-[#CCCCCC] flex space-x-3 overflow-x-auto bg-[#F4F7F5]" role="group" aria-label="メニューカテゴリ">
                ${catsHTML}
              </div>
              <div class="flex-1 overflow-y-auto p-4 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 content-start" aria-label="メニュー一覧">
                ${menuHTML}
              </div>
            </div>
            <div class="w-[400px] bg-[#F4F7F5] flex flex-col shadow-[-4px_0_15px_rgba(0,0,0,0.05)] z-10 h-full">
              <div class="p-4 bg-white border-b-2 border-[#CCCCCC] flex flex-col space-y-3 shrink-0">
                <div class="flex items-center justify-between">
                  <span class="font-bold text-[#222222] text-lg">テーブル:</span>
                  <div class="flex space-x-2" role="group" aria-label="テーブル選択">
                    ${tablesHTML}
                  </div>
                </div>
                <div class="border-t-2 border-dashed border-[#EEEEEE] pt-3 flex justify-between items-center">
                  <span class="font-bold text-[#444444] text-sm">顧客管理:</span>
                  <button onclick="window.setIsCustomerModalOpen(true)" class="px-3 py-2 bg-[#E8F0EC] hover:bg-[#D1E2D9] text-[#0F543C] border-2 border-[#0F543C] rounded-lg font-bold text-sm flex items-center min-h-[44px] focus:outline-none focus:ring-4 focus:ring-[#0F543C]">
                    <i data-lucide="user-plus" class="w-4 h-4 mr-1"></i> お得意様登録
                  </button>
                </div>
              </div>
              <div class="flex-1 overflow-y-auto p-4" aria-live="polite">
                ${ordersHTML}
              </div>
              <div class="bg-white border-t-2 border-[#CCCCCC] p-5 space-y-4 shrink-0">
                <div class="space-y-2 mb-4">
                  <div class="flex justify-between text-[#444444] font-bold text-base">
                    <span>小計</span><span>¥${subtotal.toLocaleString()}</span>
                  </div>
                  <div class="flex justify-between text-[#444444] font-bold text-base">
                    <span>消費税 (10%)</span><span>¥${tax.toLocaleString()}</span>
                  </div>
                  <div class="flex justify-between text-2xl font-black text-[#111111] border-t-2 border-[#CCCCCC] pt-3">
                    <span>合計</span><span>¥${total.toLocaleString()}</span>
                  </div>
                </div>
                <div class="space-y-3">
                  <button onclick="window.sendToKitchen()" ${btnSendDisabled} aria-label="厨房へ注文を送信し伝票を印刷する" class="w-full py-4 min-h-[44px] bg-[#FFC700] hover:bg-[#E6B300] disabled:bg-[#EEEEEE] disabled:text-[#888888] disabled:border-[#CCCCCC] text-[#111111] rounded-xl font-bold flex items-center justify-center space-x-2 transition-colors shadow-sm focus:outline-none focus:ring-4 focus:ring-[#0F543C] focus:ring-offset-2 border-2 border-transparent">
                    <i data-lucide="printer" class="w-6 h-6" aria-hidden="true"></i>
                    <span class="text-lg">厨房へ注文 ＆ 伝票印刷</span>
                  </button>
                  <button onclick="window.processCheckout()" ${btnCheckoutDisabled} aria-label="お会計を完了しレシートを印刷する" class="w-full py-5 min-h-[44px] bg-[#0F543C] hover:bg-[#0A3D2B] disabled:bg-[#EEEEEE] disabled:text-[#888888] disabled:border-[#CCCCCC] text-white rounded-xl font-bold flex items-center justify-center space-x-2 transition-colors shadow-md text-xl focus:outline-none focus:ring-4 focus:ring-[#FFC700] focus:ring-offset-2 border-2 border-transparent">
                    <i data-lucide="calculator" class="w-7 h-7" aria-hidden="true"></i>
                    <span>お会計 ＆ レシート印刷</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      } 
      
      if (state.activeTab === 'kitchen') {
        let kitchenContent = '';
        if (state.kitchenTickets.length === 0) {
          kitchenContent = `<div class="text-center text-[#444444] mt-20 font-bold text-xl">現在、調理待ちの注文はありません</div>`;
        } else {
          let ticketsHTML = '';
          state.kitchenTickets.forEach(ticket => {
            const isPending = ticket.status === 'pending';
            const borderClass = isPending ? 'border-t-[#FFC700] border-[#CCCCCC]' : 'border-t-[#999999] border-[#EEEEEE] opacity-70';
            
            let itemsHTML = '';
            ticket.items.forEach(item => {
              // 備考を目立たせるHTML
              let noteHTML = '';
              if (item.note) {
                noteHTML = `<div class="text-[#D32F2F] text-sm mt-1 ml-2 font-bold bg-[#FFEBEB] inline-block px-2 py-0.5 rounded border border-[#D32F2F]"><i data-lucide="alert-circle" class="w-3 h-3 inline-block -mt-0.5 mr-1"></i>${item.note}</div>`;
              }
              itemsHTML += `
                <li class="border-b border-dashed border-[#CCCCCC] pb-3 last:border-0 last:pb-0">
                  <div class="flex justify-between items-start text-xl">
                    <span class="font-bold text-[#111111]">${item.item.name}</span>
                    <span class="font-bold text-[#0F543C] bg-[#E8F0EC] px-3 py-1 rounded-md border border-[#0F543C]">x${item.qty}</span>
                  </div>
                  ${noteHTML}
                </li>
              `;
            });

            let actionHTML = '';
            if (isPending) {
              actionHTML = `<button onclick="window.markTicketCompleted(${ticket.id})" aria-label="テーブル${ticket.table}の調理を完了とする" class="w-full py-4 min-h-[44px] bg-[#0F543C] hover:bg-[#0A3D2B] text-white font-bold text-lg rounded-xl flex items-center justify-center transition-colors focus:outline-none focus:ring-4 focus:ring-[#FFC700] focus:ring-offset-2"><i data-lucide="circle-check" class="w-6 h-6 mr-2" aria-hidden="true"></i> 調理完了</button>`;
            } else {
              actionHTML = `<div class="w-full py-4 text-[#444444] font-bold text-lg text-center flex items-center justify-center border-2 border-[#CCCCCC] rounded-xl bg-[#EEEEEE]" aria-label="提供済み"><i data-lucide="circle-check" class="w-6 h-6 mr-2" aria-hidden="true"></i> 提供済み</div>`;
            }

            ticketsHTML += `<div class="bg-white rounded-xl shadow-md border-t-8 overflow-hidden flex flex-col border-2 ${borderClass}"><div class="p-4 border-b-2 border-[#EEEEEE] bg-[#F8F9FA] flex justify-between items-center"><span class="font-bold text-2xl text-[#111111]">Tbl ${ticket.table}</span><span class="font-bold text-[#444444]">${formatTime(ticket.time)}</span></div><div class="p-5 flex-1"><ul class="space-y-4">${itemsHTML}</ul></div><div class="p-4 bg-[#F8F9FA] border-t-2 border-[#EEEEEE]">${actionHTML}</div></div>`;
          });
          kitchenContent = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 content-start">${ticketsHTML}</div>`;
        }

        return `
          <div class="p-8 h-full overflow-y-auto bg-[#F4F7F5]">
            <h2 class="text-3xl font-bold text-[#111111] mb-6 flex items-center border-b-2 border-[#CCCCCC] pb-4">
              <i data-lucide="chef-hat" class="mr-3 text-[#0F543C] w-8 h-8" aria-hidden="true"></i> 厨房の注文状況
            </h2>
            ${kitchenContent}
          </div>
        `;
      }

      if (state.activeTab === 'sales') {
        const totalSales = state.salesRecord.reduce((sum, r) => sum + r.total, 0);
        let salesContent = '';
        if (state.salesRecord.length === 0) {
          salesContent = `<div class="p-10 text-center text-[#444444] font-bold text-lg">本日の売上はまだありません。</div>`;
        } else {
          let rowsHTML = '';
          state.salesRecord.forEach(record => {
            const itemsText = record.items.map(i => {
              let text = i.item.name + 'x' + i.qty;
              if (i.note || i.extraCharge) {
                text += ` <span class="text-[#D32F2F] text-xs">(${i.note ? i.note : ''}${i.note && i.extraCharge ? ', ' : ''}${i.extraCharge ? '+¥'+i.extraCharge : ''})</span>`;
              }
              return text;
            }).join('<br/>');
            
            rowsHTML += `<tr class="hover:bg-[#F4F7F5]"><td class="p-4 text-[#222222] font-bold align-top">${formatTime(record.time)}</td><td class="p-4 font-bold text-lg text-[#111111] align-top">Tbl ${record.table}</td><td class="p-4 text-base font-medium text-[#333333] leading-relaxed align-top">${itemsText}</td><td class="p-4 font-black text-xl text-right text-[#0F543C] align-top">¥${record.total.toLocaleString()}</td></tr>`;
          });
          salesContent = `<table class="w-full text-left border-collapse"><caption class="sr-only">本日の会計履歴一覧</caption><thead class="bg-[#E8F0EC] text-[#111111] border-b-2 border-[#0F543C]"><tr><th scope="col" class="p-4 font-bold text-lg">時間</th><th scope="col" class="p-4 font-bold text-lg">テーブル</th><th scope="col" class="p-4 font-bold text-lg">注文内容</th><th scope="col" class="p-4 font-bold text-lg text-right">金額 (税込)</th></tr></thead><tbody class="divide-y-2 divide-[#EEEEEE]">${rowsHTML}</tbody></table>`;
        }

        return `
          <div class="p-8 h-full overflow-y-auto bg-[#F4F7F5]">
            <div class="max-w-4xl mx-auto">
              <div class="bg-white rounded-2xl shadow-sm p-6 mb-8 border-2 border-[#CCCCCC] flex items-center justify-between">
                <div>
                  <h2 class="text-xl text-[#444444] font-bold mb-2">本日の売上合計 (帳簿)</h2>
                  <div class="text-5xl font-black text-[#0F543C]">
                    ¥${totalSales.toLocaleString()}
                  </div>
                </div>
                <div class="text-right border-l-2 border-[#EEEEEE] pl-6">
                  <div class="text-lg text-[#444444] font-bold mb-1">来客数 (会計回数)</div>
                  <div class="text-3xl font-black text-[#111111]">${state.salesRecord.length} 回</div>
                </div>
              </div>
              <div class="bg-white rounded-2xl shadow-sm border-2 border-[#CCCCCC] overflow-hidden">
                <div class="p-5 bg-[#F8F9FA] border-b-2 border-[#CCCCCC] font-bold text-xl text-[#111111]">
                  会計履歴
                </div>
                ${salesContent}
              </div>
            </div>
          </div>
        `;
      }

      if (state.activeTab === 'menu') {
        let menuRows = '';
        state.menu.forEach(item => {
          menuRows += `
            <tr class="border-b-2 border-[#EEEEEE] hover:bg-[#F4F7F5]">
              <td class="p-3 font-bold text-[#111111]">${item.name}</td>
              <td class="p-3 text-[#444444]">${item.category}</td>
              <td class="p-3 font-bold text-[#0F543C]">¥${item.price.toLocaleString()}</td>
              <td class="p-3 text-right">
                <button onclick="window.openMenuModal(${item.id})" aria-label="${item.name}を編集する" class="px-4 py-2 bg-[#EEEEEE] hover:bg-[#DDDDDD] text-[#111111] rounded-lg font-bold min-h-[44px] focus:outline-none focus:ring-4 focus:ring-[#0F543C] mr-2 shadow-sm border border-[#CCCCCC]">
                  <i data-lucide="pencil" class="w-5 h-5 inline-block -mt-1 mr-1"></i> 編集
                </button>
                <button onclick="window.confirmDeleteMenu(${item.id})" aria-label="${item.name}を削除する" class="px-4 py-2 bg-[#FFEBEB] hover:bg-[#FFD6D6] text-[#D32F2F] rounded-lg font-bold min-h-[44px] focus:outline-none focus:ring-4 focus:ring-[#D32F2F] shadow-sm border border-[#FFD6D6]">
                  <i data-lucide="trash-2" class="w-5 h-5 inline-block -mt-1 mr-1"></i> 削除
                </button>
              </td>
            </tr>
          `;
        });

        return `
          <div class="p-8 h-full overflow-y-auto bg-[#F4F7F5]">
            <h2 class="text-3xl font-bold text-[#111111] mb-6 flex items-center border-b-2 border-[#CCCCCC] pb-4">
              <i data-lucide="clipboard-list" class="mr-3 text-[#0F543C] w-8 h-8" aria-hidden="true"></i> メニュー管理
            </h2>
            
            <div class="bg-white rounded-2xl shadow-sm border-2 border-[#CCCCCC] overflow-hidden">
              <div class="p-5 bg-[#F8F9FA] border-b-2 border-[#CCCCCC] flex justify-between items-center">
                <h3 class="font-bold text-xl text-[#111111]">提供メニュー一覧</h3>
                <button onclick="window.openMenuModal()" class="px-4 py-2 bg-[#0F543C] text-white font-bold rounded-lg hover:bg-[#0A3D2B] min-h-[44px] focus:outline-none focus:ring-4 focus:ring-[#FFC700] flex items-center shadow-md border-2 border-transparent">
                  <i data-lucide="plus" class="w-5 h-5 mr-1" aria-hidden="true"></i> 新規メニュー追加
                </button>
              </div>
              <div class="p-0 overflow-x-auto">
                <table class="w-full text-left min-w-[600px]">
                  <thead class="bg-[#E8F0EC] text-[#111111] border-b-2 border-[#0F543C]">
                    <tr>
                      <th class="p-4 font-bold">商品名</th>
                      <th class="p-4 font-bold">カテゴリ</th>
                      <th class="p-4 font-bold">価格</th>
                      <th class="p-4 font-bold text-right">操作</th>
                    </tr>
                  </thead>
                  <tbody>${menuRows}</tbody>
                </table>
              </div>
            </div>
          </div>
        `;
      }

      if (state.activeTab === 'settings') {
        let custRows = '';
        if (state.customers.length === 0) {
          custRows = `<tr><td colspan="2" class="p-6 text-center text-[#555555] font-bold text-lg">登録されているお得意様はいません</td></tr>`;
        } else {
          state.customers.forEach(cust => {
            custRows += `
              <tr class="border-b-2 border-[#EEEEEE] hover:bg-[#F4F7F5]">
                <td class="p-3 font-bold text-[#111111] text-lg">${cust.name}</td>
                <td class="p-3 text-[#444444]">${cust.note}</td>
              </tr>
            `;
          });
        }

        const saveBtnContent = state.storeInfoSaved 
          ? `<i data-lucide="check" class="w-5 h-5 mr-1" aria-hidden="true"></i> 保存しました` 
          : `<i data-lucide="save" class="w-5 h-5 mr-1" aria-hidden="true"></i> 保存する`;
        const saveBtnColor = state.storeInfoSaved ? 'bg-green-600 hover:bg-green-700' : 'bg-[#0F543C] hover:bg-[#0A3D2B]';

        return `
          <div class="p-8 h-full overflow-y-auto bg-[#F4F7F5]">
            <h2 class="text-3xl font-bold text-[#111111] mb-6 flex items-center border-b-2 border-[#CCCCCC] pb-4">
              <i data-lucide="settings" class="mr-3 text-[#0F543C] w-8 h-8" aria-hidden="true"></i> 設定・管理
            </h2>
            
            <div class="space-y-8">
              <!-- データバックアップ管理 -->
              <div class="bg-white rounded-2xl shadow-sm border-2 border-[#CCCCCC] overflow-hidden">
                <div class="p-5 bg-[#F8F9FA] border-b-2 border-[#CCCCCC]">
                  <h3 class="font-bold text-xl text-[#111111] flex items-center">
                    <i data-lucide="database" class="w-5 h-5 mr-2" aria-hidden="true"></i> データバックアップ・復元
                  </h3>
                </div>
                <div class="p-6">
                  <p class="text-[#444444] font-bold mb-4 leading-relaxed">万が一ブラウザのデータが消えてしまっても復旧できるように、現在の状態（メニュー、売上、顧客情報など）をJSONファイルとして端末にダウンロードして保存できます。毎日の営業終了後にバックアップを保存することをおすすめします。</p>
                  <div class="flex flex-wrap gap-4">
                    <button onclick="window.exportData()" class="px-6 py-3 bg-[#0F543C] text-white font-bold rounded-xl hover:bg-[#0A3D2B] shadow-md border-2 border-transparent focus:outline-none focus:ring-4 focus:ring-[#FFC700] flex items-center transition-colors">
                      <i data-lucide="download" class="w-5 h-5 mr-2" aria-hidden="true"></i> ファイルへ保存 (バックアップ)
                    </button>
                    
                    <button onclick="window.triggerImport()" class="px-6 py-3 bg-white text-[#0F543C] font-bold rounded-xl hover:bg-[#E8F0EC] shadow-md border-2 border-[#0F543C] focus:outline-none focus:ring-4 focus:ring-[#FFC700] flex items-center transition-colors">
                      <i data-lucide="upload" class="w-5 h-5 mr-2" aria-hidden="true"></i> ファイルから復元 (インポート)
                    </button>
                    <input type="file" id="import-file-input" accept=".json" class="hidden" onchange="window.importData(event)">
                  </div>
                </div>
              </div>

              <!-- 店舗情報設定 (レシート用) -->
              <div class="bg-white rounded-2xl shadow-sm border-2 border-[#CCCCCC] overflow-hidden">
                <div class="p-5 bg-[#F8F9FA] border-b-2 border-[#CCCCCC] flex justify-between items-center">
                  <h3 class="font-bold text-xl text-[#111111]">店舗情報 (レシート印字用)</h3>
                  <button onclick="window.saveStoreInfo()" class="px-4 py-2 ${saveBtnColor} text-white font-bold rounded-lg min-h-[44px] focus:outline-none focus:ring-4 focus:ring-[#FFC700] flex items-center shadow-md border-2 border-transparent transition-colors">
                    ${saveBtnContent}
                  </button>
                </div>
                <div class="p-5 grid grid-cols-1 md:grid-cols-2 gap-6">
                  <div>
                    <label class="block font-bold text-[#111111] mb-2" for="store-name">店名</label>
                    <input type="text" id="store-name" value="${state.storeInfo.name}" placeholder="例: BuonConto" class="w-full border-2 border-[#CCCCCC] rounded-lg p-3 text-lg font-bold focus:outline-none focus:border-[#0F543C] focus:ring-2 focus:ring-[#0F543C]">
                  </div>
                  <div>
                    <label class="block font-bold text-[#111111] mb-2" for="store-tel">電話番号</label>
                    <input type="text" id="store-tel" value="${state.storeInfo.tel}" placeholder="例: 03-1234-5678" class="w-full border-2 border-[#CCCCCC] rounded-lg p-3 text-lg font-bold focus:outline-none focus:border-[#0F543C] focus:ring-2 focus:ring-[#0F543C]">
                  </div>
                  <div class="md:col-span-2">
                    <label class="block font-bold text-[#111111] mb-2" for="store-address">住所</label>

              <span>テーブル: ${data.table}</span><span>${formatDateTime(data.time)}</span>
            </div>
            <div class="border-t border-b border-dashed border-gray-400 py-4 mb-4">
              ${itemsHTML}
            </div>
            <div class="flex justify-between mb-1 text-sm text-gray-600">
              <span>小計</span><span>¥${data.subtotal.toLocaleString()}</span>
            </div>
            <div class="flex justify-between mb-2 text-sm text-gray-600">
              <span>消費税 (10%)</span><span>¥${data.tax.toLocaleString()}</span>
            </div>
            <div class="flex justify-between font-bold text-xl mt-2 border-t border-black pt-2">
              <span>合計</span><span>¥${data.total.toLocaleString()}</span>
            </div>
            <div class="text-center mt-8 text-sm whitespace-pre-line">
              ${state.storeInfo.message}
            </div>
          </div>
        `;
      }
      return '';
    }

    // --- メインレンダリング処理 ---
    function render() {
      const activeElementId = document.activeElement ? document.activeElement.id : null;

      document.getElementById('header-container').innerHTML = getHeaderHTML();
      document.getElementById('main-content').innerHTML = getMainHTML();
      document.getElementById('modal-container').innerHTML = getModalsHTML();
      document.getElementById('print-view-container').innerHTML = getPrintViewHTML();

      lucide.createIcons();

      if (activeElementId) {
        const elToFocus = document.getElementById(activeElementId);
        if (elToFocus) {
          setTimeout(() => elToFocus.focus(), 0);
        }
      }

      // レンダリング（状態変更）のたびに、ローカルストレージに自動保存する
      saveToLocalStorage();
    }

    document.addEventListener("DOMContentLoaded", () => {
      // 初期起動時にローカルストレージのデータを読み込む
      loadFromLocalStorage();
      render();
    });
  </script>
</body>
</html>
